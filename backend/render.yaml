services:
  - type: web
    name: solwizards-api
    env: node
    buildCommand: npm install
    startCommand: node server.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 5000
      - key: MONGO_URI
        sync: false
      - key: SOLANA_RPC_URL
        sync: false
      - key: BACKEND_KEYPAIR
        sync: false
      - key: CLIENT_URL
        sync: false
